spring:
  application:
    name: journey-resolution-read

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/journey_resolution}
    username: ${DATABASE_USERNAME:journey}
    password: ${DATABASE_PASSWORD:journey}

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      group-id: journey-resolution-read-v1
      enable-auto-commit: false
      auto-offset-reset: earliest

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

    listener:
      ack-mode: record

journey:
  kafka:
    topics:
      identity: identity.lifecycle.v1
      customer: customer.lifecycle.v1
      onboarding: onboarding.lifecycle.v1

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info