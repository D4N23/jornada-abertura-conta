services:
  onboarding-postgres:
    image: postgres:16-alpine
    container_name: onboarding-postgres
    environment:
      POSTGRES_DB: onboarding
      POSTGRES_USER: onboarding
      POSTGRES_PASSWORD: onboarding
    ports:
      - "5434:5432"
    volumes:
      - onboarding-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U onboarding -d onboarding"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  onboarding-postgres-data: